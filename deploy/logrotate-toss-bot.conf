# Toss Trading Bot — EC2 log rotation (install via deploy/install-logrotate.sh)
# Paths default to /home/ubuntu/toss-trading-bot (VTS prod).

/home/ubuntu/toss-trading-bot/project_metrics.log {
    weekly
    size 50M
    rotate 8
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
    dateformat -%Y%m%d
}

/home/ubuntu/toss-trading-bot/trade_log.csv {
    monthly
    rotate 12
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
    dateformat -%Y%m
}
